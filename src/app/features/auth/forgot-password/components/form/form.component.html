<div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
  <form
    class="space-y-6"
    [formGroup]="formForgotPassword"
    (submit)="handleSubmit()"
  >
    <div class="mt-2">
      <input
        type="email"
        name="email"
        id="email"
        placeholder="Enter your email to reset your password"
        autocomplete="email"
        formControlName="email"
        required
        [maxLength]="this.formLimits.email.maxLength"
        class="block w-full border-2 border-grey-300 rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-orange-600 sm:text-sm/6"
      />
      @let email = formForgotPassword.get('email');
      <div
        class="alert alert-danger"
        *ngIf="email?.invalid && (email?.dirty || email?.touched)"
      >
        <div
          *ngIf="email?.hasError('required')"
          class="flex items-center gap-1 py-1"
        >
          <ng-icon name="heroExclamationCircle" size="22" />
          {{ validationMessages.required("Email address") }}
        </div>
        <div
          *ngIf="email?.hasError('email')"
          class="flex items-center gap-1 py-1"
        >
          <ng-icon name="heroExclamationCircle" size="22" />
          {{ validationMessages.invalid("Email address") }}
        </div>
      </div>
    </div>
    <div>
      <button
        type="submit"
        [disabled]="formForgotPassword.invalid"
        class="flex w-full justify-center rounded-md bg-orange-600 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs hover:bg-orange-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-orange-600"
      >
        Submit
      </button>
    </div>
  </form>
</div>
